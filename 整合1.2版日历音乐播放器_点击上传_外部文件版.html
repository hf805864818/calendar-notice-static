<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>日历音乐双卡片整合版 - 点击上传_外部文件版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:330px;background:transparent;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;display:flex;justify-content:center;overflow:visible;box-sizing:border-box}
.dual-wrap{position:relative;width:100vw;max-width:430px;height:330px;padding-top:10px;padding-bottom:10px;perspective:1400px;transform-style:preserve-3d;isolation:isolate;overflow:visible;filter:blur(0)}
.locked .dual-wrap{filter:blur(6px);pointer-events:none;user-select:none}
.auth-mask{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.42);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.auth-box{width:min(88vw,320px);border-radius:18px;padding:18px;background:#fff;color:#111;box-shadow:0 12px 40px rgba(0,0,0,.22)}
.auth-box h3{font-size:16px;margin-bottom:10px}
.auth-box p{font-size:13px;line-height:1.6;color:#555;margin-bottom:12px}
.auth-box input{width:100%;height:42px;border:1px solid #ddd;border-radius:12px;padding:0 12px;font-size:14px;outline:none}
.auth-box button{margin-top:12px;width:100%;height:42px;border:0;border-radius:12px;background:#0A84FF;color:#fff;font-size:14px}
.auth-tip{margin-top:8px;font-size:12px;color:#888}
.stage{position:relative;width:100%;height:285px;transform-style:preserve-3d;overflow:visible}
.panel{position:absolute;left:0;top:0;width:100%;height:285px;opacity:0;pointer-events:none;backface-visibility:hidden;-webkit-backface-visibility:hidden;transform:rotateY(78deg) scale(.84) translateZ(-120px);filter:blur(14px) saturate(.75) brightness(.86);transition:transform .86s cubic-bezier(.16,1,.3,1),opacity .55s ease,filter .72s ease;z-index:1;overflow:visible}
.panel.active{position:relative;opacity:1;pointer-events:auto;transform:rotateY(0) scale(1) translateZ(0);filter:blur(0) saturate(1) brightness(1);z-index:5}
.panel.leave-left{transform:rotateY(-78deg) scale(.82) translateX(-22px) translateZ(-130px)}
.panel.leave-right{transform:rotateY(78deg) scale(.82) translateX(22px) translateZ(-130px)}
.card-iframe{display:block;width:100%;height:285px;border:0;background:transparent;overflow:hidden;transform:none;transform-origin:top center}
#calendarFrame,#musicFrame{height:285px}
.weekly-hotspot{position:absolute;left:calc(50% - 180px + 18px);top:16px;width:62px;height:28px;z-index:999;border:0;border-radius:10px;background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.weekly-hotspot:active{background:rgba(120,190,255,.10)}
.back-btn{position:absolute;right:4px;top:4px;width:20px;height:20px;z-index:70;border:0;border-radius:999px;display:none;align-items:center;justify-content:center;cursor:pointer;color:var(--color-control,rgba(0,0,0,.62));background:var(--bg-control,rgba(255,255,245,.48));box-shadow:0 2px 7px rgba(0,0,0,.10),inset 0 0 0 1px rgba(255,255,255,.18);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);-webkit-tap-highlight-color:transparent;transition:.2s ease}
.back-btn.show{display:flex;animation:pop .28s cubic-bezier(.16,1,.3,1) both}
.back-btn:active{transform:scale(.86)}
.back-btn svg{width:10px;height:10px}
.flash{position:absolute;inset:-18px;z-index:45;border-radius:28px;pointer-events:none;opacity:0;background:conic-gradient(from 120deg,transparent,rgba(93,190,255,.72),rgba(190,100,255,.68),transparent),radial-gradient(circle,rgba(255,255,255,.38),transparent 55%);filter:blur(18px);mix-blend-mode:screen}
.flash.run{animation:flashSpin .88s cubic-bezier(.16,1,.3,1) both}
.particles{position:absolute;inset:0;z-index:46;pointer-events:none;overflow:hidden;border-radius:28px}
.p{position:absolute;left:var(--x);top:var(--y);width:var(--s);height:var(--s);border-radius:50%;background:var(--c);box-shadow:0 0 14px var(--c);opacity:0;animation:fly .78s cubic-bezier(.16,1,.3,1) forwards}
@keyframes flashSpin{0%{opacity:0;transform:scale(.72) rotate(0)}35%{opacity:.9;transform:scale(1.06) rotate(80deg)}100%{opacity:0;transform:scale(1.2) rotate(190deg)}}
@keyframes fly{0%{opacity:0;transform:translate3d(0,0,0) scale(.2)}22%{opacity:1}100%{opacity:0;transform:translate3d(var(--dx),var(--dy),0) scale(1.2)}}
@keyframes pop{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="authMask" class="auth-mask" style="display:none">
  <div class="auth-box">
    <h3>授权验证</h3>
    <p>请输入授权码后进入卡片页面。</p>
    <input id="authInput" placeholder="输入授权码">
    <button id="authBtn">确认进入</button>
    <div class="auth-tip" id="authTip"></div>
  </div>
</div>
<div class="dual-wrap">
  <div class="flash" id="flash"></div><div class="particles" id="particles"></div>
  <button class="weekly-hotspot" id="toMusic" aria-label="切换到音乐播放器"></button>
  <button class="back-btn" id="toCalendar" aria-label="返回日历"><svg viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  <div class="stage">
    <section class="panel active" id="calPanel"><iframe id="calendarFrame" class="card-iframe" src="calendar.html" scrolling="no"></iframe></section>
    <section class="panel" id="musPanel"><iframe id="musicFrame" class="card-iframe" src="music_player_new.html" scrolling="no" allow="autoplay"></iframe></section>
  </div>
</div>
<script>
const calPanel=document.getElementById('calPanel'), musPanel=document.getElementById('musPanel');
const toMusic=document.getElementById('toMusic'), toCalendar=document.getElementById('toCalendar');
const flash=document.getElementById('flash'), particles=document.getElementById('particles');
const authMask=document.getElementById('authMask'), authInput=document.getElementById('authInput'), authBtn=document.getElementById('authBtn'), authTip=document.getElementById('authTip');
let current='calendar', lock=false;
const AUTH_KEY='calendar_music_auth_ok';
const AUTH_VALUE_KEY='calendar_music_auth_value';
const AUTH_KEYS_URL='auth_keys.txt';
function burst(target){flash.classList.remove('run'); void flash.offsetWidth; flash.classList.add('run'); particles.innerHTML=''; const colors=['#6fc7ff','#b66cff','#fff','#73ffd2','#ffd36e']; const ox=target==='music'?46:338, oy=target==='music'?20:28; for(let i=0;i<20;i++){const p=document.createElement('i'); p.className='p'; const a=Math.PI*2*i/20+Math.random()*.5, d=42+Math.random()*135; p.style.setProperty('--x',ox+'px'); p.style.setProperty('--y',oy+'px'); p.style.setProperty('--dx',(Math.cos(a)*d*(target==='music'?1:-1))+'px'); p.style.setProperty('--dy',(Math.sin(a)*d)+'px'); p.style.setProperty('--s',(2.5+Math.random()*4.5)+'px'); p.style.setProperty('--c',colors[i%colors.length]); p.style.animationDelay=(Math.random()*.08)+'s'; particles.appendChild(p);} setTimeout(()=>particles.textContent='',900)}
function switchTo(target){if(lock||current===target)return; lock=true; burst(target); if(target==='music'){calPanel.classList.add('leave-left'); calPanel.classList.remove('active'); musPanel.classList.add('active'); toMusic.style.display='none'; toCalendar.classList.add('show'); current='music';}else{musPanel.classList.add('leave-right'); musPanel.classList.remove('active'); calPanel.classList.add('active'); toCalendar.classList.remove('show'); toMusic.style.display='block'; current='calendar';} setTimeout(()=>{calPanel.classList.remove('leave-left','leave-right'); musPanel.classList.remove('leave-left','leave-right'); lock=false;},900)}
toMusic.addEventListener('click',()=>switchTo('music')); toCalendar.addEventListener('click',()=>switchTo('calendar'));
function showAuth(){document.body.classList.add('locked'); authMask.style.display='flex'}
function enterApp(code){document.body.classList.remove('locked'); authMask.style.display='none'; localStorage.setItem(AUTH_KEY,'1'); if(code) localStorage.setItem(AUTH_VALUE_KEY, code)}
async function loadAuthKeys(){
  try{
    const res = await fetch(AUTH_KEYS_URL + '?t=' + Date.now());
    if(!res.ok) throw new Error('load auth_keys.txt failed');
    const text = await res.text();
    return text.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
  }catch(e){
    return [];
  }
}
function normalize(v){return String(v||'').trim();}
async function verifyCode(inputCode){
  const keys = await loadAuthKeys();
  const code = normalize(inputCode);
  return {ok: keys.includes(code)};
}
authBtn.onclick=async()=>{
  const code = normalize(authInput.value);
  if(!code){authTip.textContent='请输入激活码';return;}
  authBtn.disabled = true;
  authTip.textContent = '验证中...';
  const ret = await verifyCode(code);
  authBtn.disabled = false;
  if(ret.ok){
    authTip.textContent='激活成功';
    enterApp(code);
  }else{
    authTip.textContent='激活码不在白名单';
  }
};
(async function initAuth(){
  if(localStorage.getItem(AUTH_KEY)==='1'){
    enterApp(localStorage.getItem(AUTH_VALUE_KEY)||'');
    return;
  }
  showAuth();
})();
</script>
</body>
</html>
