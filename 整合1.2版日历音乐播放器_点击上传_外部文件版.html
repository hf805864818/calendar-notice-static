<html lang="zh-CN">

<head>
<meta charset="UTF-8">

<title>日历音乐双卡片整合版 - 点击上传_外部文件版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:330px;background:transparent;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;display:flex;justify-content:center;overflow:visible;box-sizing:border-box}
.dual-wrap{position:relative;width:100vw;max-width:430px;height:330px;padding-top:10px;padding-bottom:10px;perspective:1400px;transform-style:preserve-3d;isolation:isolate;overflow:visible}
.stage{position:relative;width:100%;height:285px;transform-style:preserve-3d;overflow:visible}
.panel{position:absolute;left:0;top:0;width:100%;height:285px;opacity:0;pointer-events:none;backface-visibility:hidden;-webkit-backface-visibility:hidden;transform:rotateY(78deg) scale(.84) translateZ(-120px);filter:blur(14px) saturate(.75) brightness(.86);transition:transform .86s cubic-bezier(.16,1,.3,1),opacity .55s ease,filter .72s ease;z-index:1;overflow:visible}
.panel.active{position:relative;opacity:1;pointer-events:auto;transform:rotateY(0) scale(1) translateZ(0);filter:blur(0) saturate(1) brightness(1);z-index:5}
.panel.leave-left{transform:rotateY(-78deg) scale(.82) translateX(-22px) translateZ(-130px)}
.panel.leave-right{transform:rotateY(78deg) scale(.82) translateX(22px) translateZ(-130px)}
.card-iframe{display:block;width:100%;height:285px;border:0;background:transparent;overflow:hidden;transform:none;transform-origin:top center}
#calendarFrame,#musicFrame{height:285px}
.weekly-hotspot{position:absolute;left:calc(50% - 180px + 18px);top:16px;width:62px;height:28px;z-index:999;border:0;border-radius:10px;background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.weekly-hotspot:active{background:rgba(120,190,255,.10)}
.back-btn{position:absolute;right:15px;top:4px;width:20px;height:20px;z-index:70;border:0;border-radius:999px;display:none;align-items:center;justify-content:center;cursor:pointer;color:var(--color-control,rgba(0,0,0,.62));background:var(--bg-control,rgba(255,255,245,.48));box-shadow:0 2px 7px rgba(0,0,0,.10),inset 0 0 0 1px rgba(255,255,255,.18);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);-webkit-tap-highlight-color:transparent;transition:.2s ease}
.back-btn.show{display:flex;animation:pop .28s cubic-bezier(.16,1,.3,1) both}
.back-btn:active{transform:scale(.86)}
.back-btn svg{width:10px;height:10px}
.flash{position:absolute;inset:-18px;z-index:45;border-radius:28px;pointer-events:none;opacity:0;background:conic-gradient(from 120deg,transparent,rgba(93,190,255,.72),rgba(190,100,255,.68),transparent),radial-gradient(circle,rgba(255,255,255,.38),transparent 55%);filter:blur(18px);mix-blend-mode:screen}
.flash.run{animation:flashSpin .88s cubic-bezier(.16,1,.3,1) both}
.particles{position:absolute;inset:0;z-index:46;pointer-events:none;overflow:hidden;border-radius:28px}
.p{position:absolute;left:var(--x);top:var(--y);width:var(--s);height:var(--s);border-radius:50%;background:var(--c);box-shadow:0 0 14px var(--c);opacity:0;animation:fly .78s cubic-bezier(.16,1,.3,1) forwards}
@keyframes flashSpin{0%{opacity:0;transform:scale(.72) rotate(0)}35%{opacity:.9;transform:scale(1.06) rotate(80deg)}100%{opacity:0;transform:scale(1.2) rotate(190deg)}}
@keyframes fly{0%{opacity:0;transform:translate3d(0,0,0) scale(.2)}22%{opacity:1}100%{opacity:0;transform:translate3d(var(--dx),var(--dy),0) scale(1.2)}}
@keyframes pop{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}
</style>
<meta name="viewport" content="width=390, initial-scale=1.0, user-scalable=yes"></head>
<body>
<div class="dual-wrap">
  <div class="flash" id="flash"></div><div class="particles" id="particles"></div>
  <button class="weekly-hotspot" id="toMusic" aria-label="切换到音乐播放器"></button>
  <button class="back-btn" id="toCalendar" aria-label="返回日历"><svg viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
  <div class="stage">
    <section class="panel active" id="calPanel"><iframe id="calendarFrame" class="card-iframe" src="https://hf805864818.github.io/calendar-notice-static/calendar.html" scrolling="no"></iframe></section>
    <section class="panel" id="musPanel"><iframe id="musicFrame" class="card-iframe" src="https://hf805864818.github.io/calendar-notice-static/music_player_new.html" scrolling="no" allow="autoplay"></iframe></section>
  </div>
</div>
<script>
const calPanel=document.getElementById('calPanel'), musPanel=document.getElementById('musPanel');
const toMusic=document.getElementById('toMusic'), toCalendar=document.getElementById('toCalendar');
const flash=document.getElementById('flash'), particles=document.getElementById('particles');
const musFrame=document.getElementById('musicFrame');
let current='calendar', lock=false;
function controlMusicAnimation(action){
  try{ musFrame?.contentWindow?.postMessage({type:'music-card-animation',action},'*'); }catch(e){}
}
function burst(target){
  flash.classList.remove('run'); void flash.offsetWidth; flash.classList.add('run');
  particles.innerHTML='';
  const colors=['#6fc7ff','#b66cff','#fff','#73ffd2','#ffd36e'];
  const ox=target==='music'?46:338, oy=target==='music'?20:28;
  for(let i=0;i<20;i++){
    const p=document.createElement('i'); p.className='p';
    const a=Math.PI*2*i/20+Math.random()*.5, d=42+Math.random()*135;
    p.style.setProperty('--x',ox+'px'); p.style.setProperty('--y',oy+'px');
    p.style.setProperty('--dx',(Math.cos(a)*d*(target==='music'?1:-1))+'px');
    p.style.setProperty('--dy',(Math.sin(a)*d)+'px'); p.style.setProperty('--s',(2.5+Math.random()*4.5)+'px');
    p.style.setProperty('--c',colors[i%colors.length]); p.style.animationDelay=(Math.random()*.08)+'s'; particles.appendChild(p);
  }
  setTimeout(()=>particles.textContent = '',900);
}
function switchTo(target){
  if(lock||current===target)return; lock=true; burst(target);
  if(target==='music'){
    controlMusicAnimation('resume');
    calPanel.classList.add('leave-left'); calPanel.classList.remove('active'); musPanel.classList.add('active');
    toMusic.style.display='none'; toCalendar.classList.add('show'); current='music';
  }else{
    controlMusicAnimation('pause');
    musPanel.classList.add('leave-right'); musPanel.classList.remove('active'); calPanel.classList.add('active');
    toCalendar.classList.remove('show'); toMusic.style.display='block'; current='calendar';
  }
  setTimeout(()=>{calPanel.classList.remove('leave-left','leave-right'); musPanel.classList.remove('leave-left','leave-right'); lock=false;},900);
}
toMusic.addEventListener('click',()=>switchTo('music'));
toCalendar.addEventListener('click',()=>switchTo('calendar'));

// 整合版公告功能 - 调用子iframe的公告
window.addEventListener('load', function() {
    setTimeout(function() {
        try {
            const calWin = document.getElementById('calendarFrame').contentWindow;
            if (calWin && calWin.checkNoticePopup) {
                calWin.checkNoticePopup();
            }
        } catch(e) {}
    }, 500);
});
</script>

</body></html>
