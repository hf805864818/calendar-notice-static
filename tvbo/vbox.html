        // 搜索接口URL -> 平台名称映射，从订阅JSON的 name/title/key 字段自动提取
        const SEARCH_INTERFACE_NAME_MAP = {};
        const SEARCH_INTERFACE_DETAIL_MAP = {};

        // 优先搜索的平台关键词：命中这些名称/URL的平台会排在最前面搜索和展示
        const PRIORITY_SEARCH_KEYWORDS = ['zhanyuan', '站源', 'zy', 'zanyuan', '战源', '资源', '资源站', '资源源']; // 扩展关键词，包括可能的变体

        function isPrioritySearchInterface(url) {
            const name = SEARCH_INTERFACE_NAME_MAP[url] || '';
            const text = `${name} ${url || ''}`.toLowerCase();
            return PRIORITY_SEARCH_KEYWORDS.some(key => text.includes(String(key).toLowerCase()));
        }

        function sortSearchInterfacesByPriority(interfaces) {
            return [...interfaces].sort((a, b) => {
                const pa = isPrioritySearchInterface(a) ? 0 : 1;
                const pb = isPrioritySearchInterface(b) ? 0 : 1;
                if (pa !== pb) return pa - pb;
                return 0;
            });
        }

        function sortSearchResultsByPriority(results) {
            return [...results].sort((a, b) => {
                const pa = isPrioritySearchInterface(a.interfaceUrl) ? 0 : 1;
                const pb = isPrioritySearchInterface(b.interfaceUrl) ? 0 : 1;
                if (pa !== pb) return pa - pb;
                return 0;
            });
        }

        // 带超时的fetch请求
        async function fetchWithTimeout(url, options = {}, timeout = TIMEOUT_MS) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeout);

            try {
                const response = await fetch(url, {
                    ...options,
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                return response;
            } catch (error) {
                clearTimeout(timeoutId);
                if (error.name === 'AbortError') {
                    throw new Error('请求超时');
                }
                throw error;
            }
        }

        // 获取代理后的URL
        function getProxiedUrl(url) {
            const proxy = PROXY_LIST[currentProxyIndex];
            if (!proxy) return url;
            return proxy + encodeURIComponent(url);
        }

        // 使用代理降级策略发起请求
        async function fetchDirect(url, timeout = SEARCH_TIMEOUT_MS) {
            const response = await fetchWithTimeout(url, {}, timeout);
            if (!response.ok) {
                throw new Error(`HTTP错误: ${response.status}`);
            }
            return await response.text();
        }

        async function fetchFastWithProxy(url, timeout = SEARCH_TIMEOUT_MS) {
            // 只使用第一个非空代理（最可靠的那个）
            const proxy = PROXY_LIST[1] || PROXY_LIST[2] || PROXY_LIST[0]; // 优先api.allorigins.win或corsproxy.io
            const proxiedUrl = proxy ? proxy + encodeURIComponent(url) : url;
            
            try {
                const response = await fetchWithTimeout(proxiedUrl, {}, timeout);
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status}`);
                }
                return await response.text();
            } catch (error) {
                console.warn('快速代理失败:', error.message);
                throw error;
            }
        }

        async function fetchForSearch(url) {
            // 如果是优先接口（zhanyuan等），先尝试直连，因为可能更稳定
            const isPriority = isPrioritySearchInterface(url);
            
            if (useProxyEnabled) {
                // 强制使用代理
                return await fetchFastWithProxy(url, SEARCH_TIMEOUT_MS);
            } else {
                // 先尝试直连
                try {
                    return await fetchDirect(url, SEARCH_TIMEOUT_MS);
                } catch (directError) {
                    console.log('接口直连失败，尝试代理:', directError.message);
                    // 直连失败，尝试快速代理
                    return await fetchFastWithProxy(url, SEARCH_TIMEOUT_MS);
                }
            }
        }

        // 从URL中提取接口名称（优先使用订阅里的平台名称）
        function extractInterfaceName(url) {
            if (!url) return '接口';
            if (SEARCH_INTERFACE_NAME_MAP[url]) return SEARCH_INTERFACE_NAME_MAP[url];
            try {
                const host = new URL(url).hostname.replace(/^www\./, '');
                const shortHost = host.split('.')[0] || host;
                return shortHost.substring(0, 12) || '接口';
            } catch (e) {
                const match = String(url).match(/https?:\/\/([^/]+)/i);
                return match ? match[1].replace(/^www\./, '').split('.')[0].substring(0, 12) : '接口';
            }
        }

        // 检查是否为搜索接口（支持 wd/key/keyword/search/query 多种关键词参数）
        function isSearchInterface(url) {
            if (!url) return false;
            return /(\?|&)(wd|key|keyword|search|query)=/i.test(String(url));
        }

        // 将基础 API 规范化为可搜索接口
        function normalizeToSearchApi(url) {
            if (!url) return '';

            let u = String(url).trim();
            if (!/^https?:\/\//i.test(u)) return '';

            // 清理 JSON/HTML 中可能混进来的转义和多余符号
            u = u
                .replace(/\\\//g, '/')
                .replace(/&amp;/g, '&')
                .replace(/[),;]+$/g, '')
                .replace(/["'<>]+$/g, '')
                .trim();

            // 已经有关键词参数，直接作为搜索接口
            if (isSearchInterface(u)) return u;

            // 已经有 ac 参数但缺少关键词，补 wd=
            if (/[?&]ac=/i.test(u)) {
                return `${u}${u.includes('?') ? '&' : '?'}wd=`;
            }

            // 常见苹果CMS基础API，补成 videolist 搜索接口
            // 例如 http://xxx/api.php/provide/vod => http://xxx/api.php/provide/vod/?ac=videolist&wd=
            const clean = u.replace(/\/+$/, '');
            return `${clean}/?ac=videolist&wd=`;
        }

        // 构建搜索URL（兼容 wd/key/keyword/search/query）
        function buildSearchUrl(interfaceUrl, keyword) {
            const kw = encodeURIComponent(keyword || '');
            let u = String(interfaceUrl || '').trim();

            if (/[?&]wd=/i.test(u)) {
                return u.replace(/([?&]wd=)[^&]*/i, `$1${kw}`);
            }
            if (/[?&]key=/i.test(u)) {
                return u.replace(/([?&]key=)[^&]*/i, `$1${kw}`);
            }
            if (/[?&]keyword=/i.test(u)) {
                return u.replace(/([?&]keyword=)[^&]*/i, `$1${kw}`);
            }
            if (/[?&]search=/i.test(u)) {
                return u.replace(/([?&]search=)[^&]*/i, `$1${kw}`);
            }
            if (/[?&]query=/i.test(u)) {
                return u.replace(/([?&]query=)[^&]*/i, `$1${kw}`);
            }

            return `${u}${u.includes('?') ? '&' : '?'}wd=${kw}`;
        }

        // 从订阅JSON/文本中发现搜索接口：支持 api/url/link/vod_api/player_api 等字段
        async function discoverSearchInterfaces(baseUrls) {
            const sourceUrls = Array.isArray(baseUrls) ? baseUrls : [];
            const cacheKey = JSON.stringify(sourceUrls);
            const now = Date.now();
            if (cachedSearchInterfaces && cachedSearchInterfacesKey === cacheKey && (now - cachedSearchInterfacesTime) < DISCOVER_CACHE_TTL) {
                console.log('使用缓存搜索接口:', cachedSearchInterfaces.length);
                return cachedSearchInterfaces;
            }

            const searchInterfaces = [];

            const addCandidate = (candidate, sourceName = '', detailUrl = '') => {
                const normalized = normalizeToSearchApi(candidate);
                if (normalized) {
                    if (sourceName && !SEARCH_INTERFACE_NAME_MAP[normalized]) {
                        SEARCH_INTERFACE_NAME_MAP[normalized] = String(sourceName).trim();
                    }
                    if (detailUrl && !SEARCH_INTERFACE_DETAIL_MAP[normalized]) {
                        SEARCH_INTERFACE_DETAIL_MAP[normalized] = String(detailUrl).trim();
                    }
                    if (!SEARCH_INTERFACE_NAME_MAP[normalized]) {
                        const inferred = extractNameFromJsonUrl(candidate) || extractNameFromJsonUrl(sourceName) || '';
                        if (inferred) SEARCH_INTERFACE_NAME_MAP[normalized] = inferred;
                    }
                    searchInterfaces.push(normalized);
                }
            };

            const collectDeep = (value, depth = 0, parentName = '') => {
                if (depth > 8 || value == null) return;

                if (typeof value === 'string') {
                    // 字符串本身可能就是API，也可能里面包含多个URL
                    addCandidate(value, parentName);
                    const urls = value.match(/https?:\/\/[^\s"'<>\\]+/g) || [];
                    urls.forEach(u => addCandidate(u, parentName));
                    return;
                }

                if (Array.isArray(value)) {
                    value.forEach(item => collectDeep(item, depth + 1, parentName));
                    return;
                }

                if (typeof value === 'object') {
                    const currentName = value.name || value.title || value.key || value.site_name || value.group || value.desc || parentName;
                    // 兼容“影视源.json”里的 apiyuan：searchurl/detailurl 是可直接对接的苹果CMS接口
                    if (value.searchurl || value.searchUrl || value.websearchurl) {
                        const directSearchUrl = value.searchurl || value.searchUrl;
                        if (directSearchUrl) addCandidate(directSearchUrl, currentName, value.detailurl || value.detailUrl || '');
                    }
                    // 优先采集常见接口字段，并把当前对象的平台名绑定到接口
                    ['api', 'url', 'link', 'vod_api', 'player_api', 'search', 'searchUrl', 'search_url', 'parse', 'ext'].forEach(key => {
                        if (value[key]) collectDeep(value[key], depth + 1, currentName);
                    });
                    // 再兜底递归所有字段，兼容嵌套订阅
                    Object.keys(value).forEach(key => collectDeep(value[key], depth + 1, currentName));
                }
            };

            for (const url of sourceUrls) {
                try {
                    // 订阅地址本身也可能就是基础API
                    addCandidate(url);

                    const content = await fetchWithProxy(url);

                    // A. 从纯文本中抓所有URL
                    const allUrls = content.match(/https?:\/\/[^\s"'<>\\]+/g) || [];
                    allUrls.forEach(addCandidate);

                    // B. 按 JSON 解析，深度提取 api/url/link 等字段
                    try {
                        const parsed = JSON.parse(content);
                        collectDeep(parsed, 0, extractInterfaceName(url));
                        // 尝试从JSON顶层获取名称
                        if (parsed && typeof parsed === 'object') {
                            const inferred = String(parsed.name || parsed.title || parsed.key || parsed.site_name || parsed.group || parsed.desc || '').trim();
                            if (inferred) {
                                const urlKey = normalizeToSearchApi(url);
                                if (urlKey && !SEARCH_INTERFACE_NAME_MAP[urlKey]) {
                                    SEARCH_INTERFACE_NAME_MAP[urlKey] = inferred;
                                }
                            }
                        }
                    } catch (jsonError) {
                        console.warn('订阅内容不是标准JSON，已按文本提取URL:', url);
                    }
                } catch (error) {
                    console.error(`发现接口失败: ${url}`, error);
                }
            }

            const deduped = sortSearchInterfacesByPriority([...new Set(searchInterfaces.filter(Boolean))]);
            
            // 调试：检查是否有zhanyuan接口被发现
            const zhanyuanInterfaces = deduped.filter(url => {
                const name = SEARCH_INTERFACE_NAME_MAP[url] || '';
                const urlText = url.toLowerCase();
                return urlText.includes('zhanyuan') || urlText.includes('zanyuan') || urlText.includes('站源') || name.toLowerCase().includes('zhanyuan') || name.toLowerCase().includes('站源');
            });
            if (zhanyuanInterfaces.length > 0) {
                console.log('发现 zhanyuan 接口:', zhanyuanInterfaces);
            } else {
                console.log('未发现 zhanyuan 接口，所有接口:', deduped.slice(0, 10).map(url => ({url, name: SEARCH_INTERFACE_NAME_MAP[url]})));
            }
            
            // 调试：打印名称映射情况
            console.log('SEARCH_INTERFACE_NAME_MAP 映射统计:', Object.keys(SEARCH_INTERFACE_NAME_MAP).length);
            if (Object.keys(SEARCH_INTERFACE_NAME_MAP).length > 0) {
                console.log('名称映射前3个:', Object.entries(SEARCH_INTERFACE_NAME_MAP).slice(0, 3));
            }
            
            cachedSearchInterfaces = deduped;
            cachedSearchInterfacesKey = cacheKey;
            cachedSearchInterfacesTime = Date.now();
            console.log('discovered search interfaces:', deduped);
            return deduped;
        }

        function parseResponseData(text) {
            try {
                const data = JSON.parse(text);
                if (Array.isArray(data)) {
                    return data;
                }
                if (data.data && Array.isArray(data.data)) {
                    return data.data;
                }
                if (data.list && Array.isArray(data.list)) {
                    return data.list;
                }
                return [];
            } catch (error) {
                console.error('解析响应数据失败:', error);
                return [];
            }
        }

        async function runWithConcurrency(items, limit, worker) {
            const results = new Array(items.length);
            let cursor = 0;
            const workers = Array.from({ length: Math.min(limit, items.length) }, async () => {
                while (cursor < items.length) {
                    const index = cursor++;
                    results[index] = await worker(items[index], index);
                }
            });
            await Promise.all(workers);
            return results;
        }

        // 执行搜索操作
        // 极速搜索：只搜前几个接口，秒出结果
        async function fastSearch(keyword, searchInterfaces) {
            const orderedInterfaces = sortSearchInterfacesByPriority(searchInterfaces);
            const fastInterfaces = orderedInterfaces.slice(0, FAST_SEARCH_LIMIT);
            
            const taskResults = await runWithConcurrency(fastInterfaces, SEARCH_CONCURRENCY, async (interfaceUrl) => {
                const interfaceName = extractInterfaceName(interfaceUrl);
                if (!interfaceName) return null;

                const searchUrl = buildSearchUrl(interfaceUrl, keyword);

                try {
                    const responseText = await fetchForSearch(searchUrl);
                    const data = parseResponseData(responseText);

                    if (data.length > 0) {
                        const detailUrl = SEARCH_INTERFACE_DETAIL_MAP[interfaceUrl] || '';
                        if (detailUrl) {
                            data.forEach(item => {
                                if (item && typeof item === 'object') {
                                    item._detailurl = detailUrl;
                                    item._sourceInterfaceUrl = interfaceUrl;
                                }
                            });
                        }
                        return {
                            interfaceName: interfaceName,
                            interfaceUrl: interfaceUrl,
                            detailUrl: detailUrl,
                            data: data
                        };
                    }
                } catch (error) {
                    console.error(`快速搜索失败: ${interfaceName}`, error);
                }
                return null;
            });

            return sortSearchResultsByPriority(taskResults.filter(Boolean));
        }

        async function search(keyword, searchInterfaces, onPartialResult = null) {
            // 智能验证前8个接口可用性
            const bestInterfaces = await getBestSearchInterfaces(searchInterfaces);
            
            const orderedInterfaces = sortSearchInterfacesByPriority(bestInterfaces);
            const taskResults = await runWithConcurrency(orderedInterfaces, SEARCH_CONCURRENCY, async (interfaceUrl) => {
                const interfaceName = extractInterfaceName(interfaceUrl);
                if (!interfaceName) return null;

                // 拼接关键词发起搜索
                const searchUrl = buildSearchUrl(interfaceUrl, keyword);

                try {
                    const responseText = await fetchForSearch(searchUrl);
                    const data = parseResponseData(responseText);

                    if (data.length > 0) {
                        const detailUrl = SEARCH_INTERFACE_DETAIL_MAP[interfaceUrl] || '';
                        if (detailUrl) {
                            data.forEach(item => {
                                if (item && typeof item === 'object') {
                                    item._detailurl = detailUrl;
                                    item._sourceInterfaceUrl = interfaceUrl;
                                }
                            });
                        }
                        const result = {
                            interfaceName: interfaceName,
                            interfaceUrl: interfaceUrl,
                            detailUrl: detailUrl,
                            data: data
                        };
                        if (typeof onPartialResult === 'function') {
                            try { onPartialResult(result); } catch (e) { console.warn('实时显示搜索结果失败:', e); }
                        }
                        return result;
                    }
                } catch (error) {
                    console.error(`搜索失败: ${interfaceName}`, error);
                }
                return null;
            });

            return sortSearchResultsByPriority(taskResults.filter(Boolean));
        }

        function normalizePlatformName(name) {
            let s = String(name || '').trim();
            if (!s) return '';
            // 只保留中文、英文、数字、常见分隔符，不要过滤掉所有特殊符号
            s = s.replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, ''); // 移除 emoji
            s = s.replace(/[\u200B-\u200D\uFEFF]/g, ''); // 移除零宽字符
            s = s.replace(/\s+/g, ' ').trim();
            if (!s) return '';
            // 如果包含竖线、点、横线等常见分隔符，保留它们
            const hasUsefulChar = /[\u4e00-\u9fa5a-zA-Z0-9]/.test(s);
            if (!hasUsefulChar) return '';
            return s;
        }

        function extractNameFromJsonUrl(url) {
            if (!url) return '';
            try {
                const decoded = decodeURIComponent(String(url));
                const m = decoded.match(/(?:^|[?&\/#])name=([^&?#]+)/i);
                if (m && m[1]) return normalizePlatformName(m[1].replace(/\+/g, ' '));
            } catch (e) {}
            const raw = String(url);
            const m2 = raw.match(/[?&]name=([^&?#]+)/i);
            if (m2 && m2[1]) return normalizePlatformName(decodeURIComponent(m2[1].replace(/\+/g, ' ')));
            return '';
        }

        function deriveItemTitle(item, index = 0) {
            const candidates = [
                item && item.vod_name,
                item && item.name,
                item && item.title,
                item && item.type_name,
                item && item.remarks,
                item && item.vod_remarks,
                item && item.vod_actor,
                item && item.vod_director,
                item && item.vod_year,
                item && item.vod_id,
                item && item.id
            ];
            for (const c of candidates) {
                const s = String(c || '').trim();
                if (s && !/^\d+$/.test(s)) return s;
            }
            return `视频 ${index + 1}`;
        }

        function choosePlatformName(result, index = 0) {
            const mappedName = result && result.interfaceUrl ? SEARCH_INTERFACE_NAME_MAP[result.interfaceUrl] : '';
            const candidates = [
                mappedName,
                result && result.displayName,
                result && result.sourceName,
                result && result.title,
                result && extractNameFromJsonUrl(result.sourceJsonUrl),
                result && result.interfaceName,
                result && extractInterfaceName(result.interfaceUrl)
            ];
            for (const c of candidates) {
                const s = String(c || '').trim();
                if (s && s !== '接口' && !/^\d+$/.test(s)) {
                    return s;
                }
            }
            // 如果所有候选都无效，尝试从接口URL获取最后一部分作为名称
            if (result && result.interfaceUrl) {
                try {
                    const url = new URL(result.interfaceUrl);
                    const host = url.hostname.replace(/^www\./, '');
                    const parts = host.split('.');
                    if (parts.length >= 2) {
                        const name = parts[parts.length - 2];
                        if (name && name.length > 1) return name;
                    }
                } catch (e) {
                    // 忽略URL解析错误
                }
            }
            // 最后才用"未命名平台"
            return '未命名平台';
        }

        function setActiveSearchPlatform(index) {
            const tabs = document.getElementById('sourceTabs');
            const container = document.getElementById('searchResultsContainer');
            if (!tabs || !container) return;
            tabs.querySelectorAll('.source-tab').forEach((tab, i) => {
                tab.classList.toggle('active', i === index);
                tab.classList.toggle('text-white', i === index);
                tab.classList.toggle('text-white/70', i !== index);
            });
            container.querySelectorAll('[data-platform-panel]').forEach((panel, i) => {
                panel.classList.toggle('hidden', i !== index);
            });
        }

        // 显示搜索结果：平台名称横向展示，下面显示当前平台对应资源，左右滑动切换平台
        function displaySmartSearchResults(results) {
            const container = document.getElementById('searchResultsContainer');
            const tabs = document.getElementById('sourceTabs');
            container.innerHTML = '';

            if (tabs) {
                tabs.style.display = 'flex';
                tabs.innerHTML = '';
            }

            if (results.length === 0) {
                container.innerHTML = '<div class="text-white/40 text-xs text-center py-2">未找到搜索结果</div>';
                return;
            }

            const totalCount = results.reduce((sum, result) => sum + (result.data ? result.data.length : 0), 0);

            results.forEach((result, index) => {
                const platformName = choosePlatformName(result, index);
                const count = result.data ? result.data.length : 0;
                const sourceBadge = result.interfaceName && normalizePlatformName(result.interfaceName) && platformName !== normalizePlatformName(result.interfaceName) ? ` · ${normalizePlatformName(result.interfaceName)}` : '';

                if (tabs) {
                    const tab = document.createElement('button');
                    tab.className = `source-tab glass-btn px-2 py-1 rounded text-[10px] cursor-pointer whitespace-nowrap ${index === 0 ? 'active text-white' : 'text-white/70'}`;
                    tab.textContent = `${platformName}(${count})`;
                    tab.onclick = () => setActiveSearchPlatform(index);
                    tabs.appendChild(tab);
                }

                const panel = document.createElement('div');
                panel.dataset.platformPanel = String(index);
                panel.className = `${index === 0 ? '' : 'hidden'} rounded-lg border border-white/10 bg-white/5 overflow-hidden`;

                const title = document.createElement('div');
                title.className = 'px-2 py-2 bg-black/30 text-white text-[11px] font-semibold flex items-center justify-between border-b border-white/5';
                title.innerHTML = `
                    <span class="truncate">${platformName}</span>
                    <span class="text-white/50 text-[10px] flex-shrink-0 ml-2">${count}条${sourceBadge}</span>
                `;
                panel.appendChild(title);

                result.data.forEach((item, itemIndex) => {
                    const resultBtn = document.createElement('div');
                    resultBtn.className = 'px-2 py-1.5 cursor-pointer hover:bg-white/10 border-t border-white/5';
                    resultBtn.innerHTML = `
                        <div class="text-white text-xs font-medium truncate">${deriveItemTitle(item, itemIndex)}</div>
                        <div class="text-white/50 text-[10px] truncate">${item.vod_remarks || item.remarks || ''}${(item.vod_remarks || item.remarks) && (item.type_name || item.type) ? ' · ' : ''}${item.type_name || item.type || ''}</div>
                    `;
                    resultBtn.onclick = () => {
                        const vodId = item.vod_id || item.id;
                        if (vodId) {
                            loadVideoDetail(vodId, 'smart-' + platformName);
                        }
                    };
                    panel.appendChild(resultBtn);
                });

                container.appendChild(panel);
            });

            const summary = document.createElement('div');
            summary.className = 'text-white/40 text-[10px] text-center py-1';
            summary.textContent = `共 ${results.length} 个平台 / ${totalCount} 条结果，横向滑动上方平台名称切换`;
            container.appendChild(summary);
        }

        function renderSearchResultsRealtime(results, isSearching = true) {
            const sorted = sortSearchResultsByPriority(results);
            displaySmartSearchResults(sorted);
            const summary = document.getElementById('searchResultsContainer')?.lastElementChild;
            if (summary && summary.className.includes('text-center')) {
                summary.textContent = isSearching
                    ? `${summary.textContent}，其他平台继续搜索中...`
                    : summary.textContent.replace('，其他平台继续搜索中...', '');
            }
        }

        // 轮训搜索所有源（智能搜索）
        async function searchAllSources() {

            if (!keyword) {
                await showAlert('请输入搜索关键词', '提示');

                tabs.innerHTML = '<button class="source-tab glass-btn px-2 py-1 rounded text-white text-[10px] whitespace-nowrap active">搜索中...</button>';

            try {
                // 1. 发现所有360资源平台的搜索接口
                console.log('步骤1: 发现搜索接口');
                const searchInterfaces = await discoverSearchInterfaces([...SAVED_API_URLS, ...jsonApis]);
                console.log(`发现 ${searchInterfaces.length} 个搜索接口`);

                if (searchInterfaces.length === 0) {
                    container.innerHTML = '<div class="text-white/40 text-xs text-center py-2">未发现搜索接口</div>';

                // 2. 执行搜索：搜到哪个平台就先显示哪个平台，其他平台后台继续
                console.log('步骤2: 执行搜索');
                const realtimeResults = [];
                const seenRealtime = new Set();
                const results = await search(keyword, searchInterfaces, (partial) => {
                    const key = partial.interfaceUrl || partial.interfaceName;
                    if (seenRealtime.has(key)) return;
                    seenRealtime.add(key);
                    realtimeResults.push(partial);
                    renderSearchResultsRealtime(realtimeResults, true);
                });
                console.log(`搜索完成，找到 ${results.length} 个有效结果`);

                // 3. 显示最终结果
                displaySmartSearchResults(results);

            } catch (error) {
                console.error('智能搜索失败:', error);
                container.innerHTML = `<div class="text-red-400 text-xs text-center py-2">搜索失败: ${error.message}</div>`;
            } finally {
                loadingEl.classList.add('hidden');
            }
        }

        // 加载视频详情（支持智能搜索）
        async function loadVideoDetail(vodId, sourceKey) {
            const loadingEl = document.getElementById('searchLoading');
            const container = document.getElementById('searchResultsContainer');

            loadingEl.classList.remove('hidden');

            try {
                // 智能搜索模式
                if (sourceKey && sourceKey.startsWith('smart-')) {
                    // 从搜索结果缓存中获取详情
                    const interfaceName = sourceKey.replace('smart-', '');
                    // 需要重新搜索获取详情数据
                    const keyword = document.getElementById('searchInput').value.trim();
                    if (!keyword) {
                        throw new Error('搜索关键词不能为空');
                    }

                    // 重新搜索以获取完整数据
                    const searchInterfaces = await discoverSearchInterfaces([...SAVED_API_URLS, ...jsonApis]);
                    const results = await search(keyword, searchInterfaces);

                    const result = results.find(r => r.interfaceName === interfaceName);
                    if (!result) {
                        throw new Error('未找到该平台的数据');
                    }

                    const item = result.data.find(d => (d.vod_id === vodId || d.id === vodId));
                    if (!item) {
                        throw new Error('未找到该视频的详情');
                    }

                    // 如果搜索接口只返回基础信息，则使用 detailurl + vod_id 获取详情
                    let playlist = item.vod_play_url;
                    if (!playlist && item._detailurl && (item.vod_id || item.id)) {
                        const detailRequestUrl = item._detailurl + encodeURIComponent(item.vod_id || item.id);
                        const detailText = await fetchWithProxy(detailRequestUrl);
                        const detailData = parseResponseData(detailText);
                        if (detailData && detailData.length > 0) {
                            Object.assign(item, detailData[0]);
                            playlist = item.vod_play_url;
                        }
                    }

                    // 解析播放地址
                    if (playlist) {
                        // 清空现有列表
                        videoList = [];
                        categorizedChannels = {};

                        // 解析播放地址格式：标题$URL#标题$URL...
                        const episodes = playlist.split('#');
                        const channels = [];

                        episodes.forEach((ep, index) => {
                            const parts = ep.split('$');
                            if (parts.length >= 2) {
                                const title = parts[0].trim();
                                const url = parts[1].trim();
                                if (url.startsWith('http')) {
                                    videoList.push(url);
                                    channels.push({
                                        name: title,
                                        url: url,
                                        group: item.vod_name
                                    });
                                }
                            }
                        });

                        if (channels.length > 0) {
                            categorizedChannels[item.vod_name] = channels;
                            currentVideoIndex = 0;

                            // 更新UI
                            updateEpisodeBtn();
                            renderCategorizedList();

                            // 加载第一个视频
                            loadVideo(0);

                            // 关闭搜索面板
                            document.getElementById('searchPanel').classList.add('hidden');

                            // 显示成功提示
                            await showAlert(`已加载《${item.vod_name}》共${channels.length}集`, '加载完成');
                        } else {
                            throw new Error('未找到可播放的集数');
                        }
                    } else {
                        throw new Error('该视频没有播放地址');
                    }
                }
            } catch (error) {
                console.error('加载详情失败:', error);
                await showAlert('加载详情失败: ' + error.message, '加载失败');
            } finally {
                loadingEl.classList.add('hidden');
            }
        }

        // 搜索输入框回车触发搜索
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchAllSources();
            }
        });

        // JSON接口输入框回车触发添加
        document.getElementById('jsonApiUrlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addJsonApi();
            }
        });
    </script>
</body>
