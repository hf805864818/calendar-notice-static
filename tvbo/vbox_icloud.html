        //       
        async function resolveShareUrl() {
            const input = document.getElementById('driveShareInput');
            const url = input.value.trim();
            if (!url) { showAlert('请输入分享链接', '提示'); return; }

            const type = document.getElementById('driveTypeSelect').value;
            const cfg = DRIVE_CONFIGS[type];

            let shareId = null;
            let sharePwd = null;

            if (cfg.shareRegex) {
                const m = url.match(cfg.shareRegex);
                if (m) shareId = m[1];
            }
            if (!shareId) {
                const m2 = url.match(/\/s\/([a-zA-Z0-9_-]+)/);
                if (m2) shareId = m2[1];
            }
            const pwdMatch = url.match(/pwd[=:]\s*([a-zA-Z0-9]{4})/i) || url.match(/提取码[::]\s*([a-zA-Z0-9]{4})/);
            if (pwdMatch) sharePwd = pwdMatch[1];

            if (!shareId) { showAlert('无法识别该分享链接格式', '错误'); return; }

            driveState.shareId = shareId;
            driveState.sharePwd = sharePwd;
            driveState.currentPath = [{ id: 'root', name: '分享文件' }];
            document.getElementById('driveStatus').textContent = '分享模式';

            showAlert(`已解析分享链接: ${shareId.substring(0,12)}...${sharePwd ? ' 密码:' + sharePwd : ''}`, '解析成功');

            if (cfg.shareTokenUrl) {
                try {
                    const t = driveState.token || '';
                    await browseShareFiles(type, shareId, sharePwd, t);
                } catch(e) {
                    console.error('获取分享Token失败:', e);
                    showAlert('获取分享Token失败,请检查Token或分享链接', '错误');
                }
            }
        }

        async function browseShareFiles(type, shareId, sharePwd, tokn) {
            const cfg = DRIVE_CONFIGS[type];
            const loadingEl = document.getElementById('driveFileList');
            loadingEl.innerHTML = '<div class="text-white/40 text-xs text-center py-4">加载分享内容中...</div>';

            let shareToken = null;
            try {
                if (type === 'alipan') {
                    const body = JSON.stringify({ share_id: shareId, share_pwd: sharePwd || '' });
                    const resp = await apiFetch(cfg.shareTokenUrl, {
                        method: 'POST', body, headers: { 'Content-Type': 'application/json', ...cfg.getAuthHeader(tokn) }
                    });
                    const data = JSON.parse(resp);
                    shareToken = data.share_token;
                    if (!shareToken) throw new Error('无法获取share_token');

                    const listResp = await apiFetch(cfg.shareAnonymousUrl + '?share_id=' + shareId, {
                        headers: { 'x-share-token': shareToken, ...cfg.getAuthHeader(tokn) }
                    });
                    const listData = JSON.parse(listResp);
                    driveState.driveId = listData.drive_id || null;

                    const files = (listData.items || []).map(f => ({
                        id: f.file_id, name: f.name, type: f.type,
                        isFolder: f.type === 'folder',
                        isVideo: f.category === 'video' || /\.(mp4|mkv|mov|avi|flv|ts|m3u8|wmv|webm|rmvb)$/i.test(f.name),
                        size: f.size
                    }));
                    renderDriveFiles(files);
                } else if (type === 'quark') {
                    const body = JSON.stringify({ share_id: shareId, passcode: sharePwd || '', pdir_fid: '0', _page: 1, _size: 100, _fetch_total: 1 });
                    const resp = await apiFetch('https://drive-pc.quark.cn/1/clouddrive/share/sharepage/detail', {
                        method: 'POST', body, headers: { 'Content-Type': 'application/json', ...cfg.getAuthHeader(tokn) }
                    });
                    const data = JSON.parse(resp);
                    const files = (data.data && data.data.list || []).map(f => ({
                        id: f.fid, name: f.file_name || f.name, type: f.file ? 'file' : 'folder',
                        isFolder: !f.file,
                        isVideo: /\.(mp4|mkv|mov|avi|flv|ts|m3u8|wmv|webm|rmvb)$/i.test(f.file_name || f.name),
                        size: f.size
                    }));
                    renderDriveFiles(files);
                } else {
                    loadingEl.innerHTML = '<div class="text-white/40 text-xs text-center py-4">该网盘分享需手动输入路径</div>';
                }
            } catch(e) {
                console.error('浏览分享文件失败:', e);
                loadingEl.innerHTML = '<div class="text-red-400 text-xs text-center py-4">加载失败: ' + e.message + '</div>';
            }
        }

        async function openDriveBrowser() {
            //       "  "  ,               
            toggleDrivePanel();
            openDriveBrowserFromPanel();
        }

        //   :               
        async function resolveDrivePlay(dtype, dtkn, dId, fId, fName, closePanel) {
            const cfg = DRIVE_CONFIGS[dtype];
            if (!cfg) { showAlert('不支持的网盘类型', '错误'); return; }
            let playUrl = null;
            try {
                if (dtype === 'alipan') {
                    const body = JSON.stringify({ drive_id: dId, file_id: fId, category: 'live_transcoding', template_id: '' });
                    const resp = await apiFetch(cfg.playUrl, {
                        method: 'POST', body, headers: { 'Content-Type': 'application/json', ...cfg.getAuthHeader(dtkn) }
                    });
                    const data = JSON.parse(resp);
                    const tasks = data.video_preview_play_info && data.video_preview_play_info.live_transcoding_task_list;
                    if (tasks && tasks.length > 0) {
                        const best = tasks.find(t => t.template_id === 'FHD') || tasks.find(t => t.template_id === 'HD') || tasks.find(t => t.template_id === 'SD') || tasks[0];
                        playUrl = best.url;
                    }
                    if (!playUrl) {
                        const dlResp = await apiFetch(cfg.downloadUrl, {
                            method: 'POST', body: JSON.stringify({ drive_id: dId, file_id: fId }),
                            headers: { 'Content-Type': 'application/json', ...cfg.getAuthHeader(dtkn) }
                        });
                        const dlD = JSON.parse(dlResp);
                        playUrl = dlD.url || dlD.download_url;
                    }
                } else if (dtype === 'quark') {
                    const params = new URLSearchParams({ fid: fId, pr: 'ucpro', fr: 'pc', uc_param_str: '' });
                    const resp = await apiFetch(cfg.playUrl + '?' + params.toString(), { headers: cfg.getAuthHeader(dtkn) });
                    const d = JSON.parse(resp);
                    playUrl = d.data && d.data.play_url || d.play_url;
                } else if (dtype === 'baidu') {
                    const dlResp = await apiFetch(cfg.downloadUrl + '?app_id=250528&method=locatedownload&check_blue=1&path=' + encodeURIComponent(fId), { headers: cfg.getAuthHeader(dtkn) });
                    const dlData = JSON.parse(dlResp);
                    playUrl = dlData.url || (dlData.urls && dlData.urls[0] && dlData.urls[0].url);
                }
                if (playUrl) {
                    videoList = [playUrl];
                    currentVideoIndex = 0;
                    loadVideo(0);
                    if (closePanel !== false) toggleDrivePanel();
                    showAlert(`正在播放: ${fName}`, '成功');
                } else {
                    showAlert('无法获取播放地址', '播放失败');
                }
            } catch(e) {
                console.error('获取播放地址失败:', e);
                showAlert('获取播放地址失败: ' + e.message, '错误');
            }
        }

        async function getDriveVideoUrl(fileId, fileName) {
            await resolveDrivePlay(driveState.type, driveState.token, driveState.driveId, fileId, fileName, true);
        }

        async function getDriveVideoUrlByToken(dtype, dtkn, dId, fId, fName) {
            await resolveDrivePlay(dtype, dtkn, dId, fId, fName, false);
        }

        //     (              )
        async function searchCloudDrive(driveType, token, keyword) {
            const cfg = DRIVE_CONFIGS[driveType];
            if (!cfg || !cfg.listUrl) return { data: [] };
            
            try {
                let files = [];
                
                if (driveType === 'alipan') {
                    //    drive_id
                    let driveId = null;
                    try {
                        const infoResp = await apiFetch('https://api.aliyundrive.com/adrive/v1/user/getDriveInfo', {
                            headers: cfg.getAuthHeader(token)
                        });
                        const info = JSON.parse(infoResp);
                        driveId = info.default_drive_id || info.resource_drive_id;
                    } catch(e) {}
                    if (!driveId) return { data: [] };
                    
                    //       API: adrive/v2/file/search
                    const searchBody = JSON.stringify({
                        drive_id: driveId,
                        query: 'name match "' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '"',
                        limit: 50,
                        order_by: 'updated_at',
                        order_direction: 'DESC',
                        image_thumbnail_process: 'image/resize,w_200',
                        video_thumbnail_process: 'video/snapshot,t_1000,f_jpg,w_200'
                    });
                    const resp = await apiFetch('https://api.aliyundrive.com/adrive/v2/file/search', {
                        method: 'POST', body: searchBody,
                        headers: { 'Content-Type': 'application/json', ...cfg.getAuthHeader(token) }
                    });
                    const data = JSON.parse(resp);
                    files = (data.items || []).map(f => ({
                        vod_id: f.file_id,
                        vod_name: f.name,
                        vod_pic: f.thumbnail || '',
                        vod_remarks: (f.size ? (f.size > 1073741824 ? (f.size/1073741824).toFixed(1)+'GB' : f.size > 1048576 ? (f.size/1048576).toFixed(1)+'MB' : f.size > 1024 ? (f.size/1024).toFixed(0)+'KB' : f.size+'B') : '') + (f.category === 'video' ? ' 🎬' : ' 📄'),
                        _driveType: 'alipan',
                        _driveId: driveId,
                        _fileId: f.file_id,
                        _isVideo: f.category === 'video' || /\.(mp4|mkv|mov|avi|flv|ts|m3u8|wmv|webm|rmvb)$/i.test(f.name)
                    }));
                } else if (driveType === 'quark') {
                    //         +    (           API)
                    const url = cfg.listUrl + '?pr=ucpro&fr=pc&uc_param_str=&pdir_fid=0&_page=1&_size=100&_sort=file_type:asc,updated_at:desc';
                    const resp = await apiFetch(url, { headers: cfg.getAuthHeader(token) });
                    const data = JSON.parse(resp);
                    const allFiles = cfg.extractList(data);
                    files = allFiles
                        .filter(f => f.name.toLowerCase().includes(keyword.toLowerCase()))
                        .map(f => ({
                            vod_id: f.id,
                            vod_name: f.name,
                            vod_pic: '',
                            vod_remarks: (f.size ? (f.size > 1073741824 ? (f.size/1073741824).toFixed(1)+'GB' : f.size > 1048576 ? (f.size/1048576).toFixed(1)+'MB' : f.size > 1024 ? (f.size/1024).toFixed(0)+'KB' : f.size+'B') : '') + (f.isVideo ? ' 🎬' : ' 📄'),
                            _driveType: 'quark',
                            _fileId: f.id,
                            _isVideo: f.isVideo
                        }));
                } else if (driveType === 'baidu') {
                    //         
                    const searchUrl = 'https://pan.baidu.com/api/search?key=' + encodeURIComponent(keyword) + '&order=time&desc=1&web=1&num=50';
                    const resp = await apiFetch(searchUrl, { headers: cfg.getAuthHeader(token) });
                    const data = JSON.parse(resp);
                    files = (data.data || data.list || []).map(f => ({
                        vod_id: f.fs_id || f.id,
                        vod_name: f.server_filename || f.name,
                        vod_pic: f.thumb || '',
                        vod_remarks: (f.size ? (f.size > 1073741824 ? (f.size/1073741824).toFixed(1)+'GB' : f.size > 1048576 ? (f.size/1048576).toFixed(1)+'MB' : f.size > 1024 ? (f.size/1024).toFixed(0)+'KB' : f.size+'B') : '') + ' 📄',
                        _driveType: 'baidu',
                        _fileId: f.fs_id || f.id,
                        _isVideo: f.category === 1 || /\.(mp4|mkv|mov|avi|flv|ts|m3u8|wmv|webm|rmvb)$/i.test(f.server_filename || f.name)
                    }));
                }
                
                //         
                files.sort((a, b) => {
                    if (a._isVideo && !b._isVideo) return -1;
                    if (!a._isVideo && b._isVideo) return 1;
                    return 0;
                });
                
                return { data: files };
            } catch(e) {
                console.warn('网盘搜索[' + driveType + ']出错:', e.message);
                return { data: [] };
            }
        }

            c.innerHTML = entries.map(function(p) {

        function setDriveTokenFromPanel() {
            var input = document.getElementById("driveTokenInputPanel");

            if (!token) { showAlert("请输入Token", "提示"); return; }
            var type = document.getElementById("driveTypeSelect2") ? document.getElementById("driveTypeSelect2").value : "alipan";

        function resolveShareUrlFromPanel() {
            var input = document.getElementById("driveShareInputPanel");
            var url = input ? input.value.trim() : "";
            if (!url) { showAlert("请输入分享链接", "提示"); return; }
            resolveShareUrlWithUrl(url);
            input.value = "";
        }
        async function resolveShareUrlWithUrl(url) {
            var keys = Object.keys(DRIVE_CONFIGS);
            for (var i = 0; i < keys.length; i++) {
                var t = keys[i], cfg = DRIVE_CONFIGS[t];
                if (!cfg.shareRegex) continue;
                var m = url.match(cfg.shareRegex);
                if (m) {
                    driveState.type = t;
                    document.getElementById("driveTypeSelect2").value = t;
                    driveState.token = getTokenForType(t);
                    document.getElementById("driveStatusPanel").textContent = "解析中...";
                    var p = url.match(/pwd[=:]\s*([a-zA-Z0-9]{4})/i) || url.match(/提取码[::]\s*([a-zA-Z0-9]{4})/) || [null,null];
                    driveState.shareId = m[1]; driveState.sharePwd = p[1];
                    driveState.currentPath = [{id:"root",name:"分享文件"}];
                    await browseShareFiles(t, m[1], p[1], driveState.token || "");
                    document.getElementById("driveStatusPanel").textContent = "分享模式";
                    return;
                }
            }
            showAlert("无法识别该分享链接格式", "错误");
        }
        async function openDriveBrowserFromPanel() {
            driveState.token = getTokenForType(driveState.type);
            if (!driveState.token) { showAlert("请先保存Token", "提示"); return; }
            document.getElementById("driveStatusPanel").textContent = "加载中...";
            renderBreadcrumbPanel();
            await loadDriveFilesPanel("root");
        }
        function renderBreadcrumbPanel() {
            var bc = document.getElementById("driveBreadcrumbPanel"); if (!bc) return;
            bc.innerHTML = driveState.currentPath.map(function(p,i) {
                var last = i === driveState.currentPath.length-1;
                var sep = i>0 ? '<span style="color:rgba(255,255,255,0.3)">/</span>' : "";
                return sep + '<span onclick="navigateDrivePathPanel(' + i + ')" style="color:' + (last?"rgba(255,255,255,0.9);font-weight:600":"rgba(255,255,255,0.4)") + ';font-size:11px;cursor:pointer">' + p.name + '</span>';
            }).join("");
        }
        function navigateDrivePathPanel(index) {
            driveState.currentPath = driveState.currentPath.slice(0, index+1);
            renderBreadcrumbPanel();
            loadDriveFilesPanel(driveState.currentPath[driveState.currentPath.length-1].id);
        }
        async function loadDriveFilesPanel(parentFileId) {
            var container = document.getElementById("driveFileListPanel"); if (!container) return;
            container.innerHTML = '<div class="text-white/40 text-xs text-center py-4">加载中...</div>';
            var cfg = DRIVE_CONFIGS[driveState.type], token = driveState.token;
            try {
                var resp;
                if (driveState.type === "alipan") {
                    if (!driveState.driveId) {
                        var r = await apiFetch("https://api.aliyundrive.com/adrive/v1/user/getDriveInfo", {headers:cfg.getAuthHeader(token)});
                        driveState.driveId = JSON.parse(r).default_drive_id;
                    }
                    resp = await apiFetch(cfg.listUrl, {method:"POST", body:JSON.stringify(cfg.listBody(driveState.driveId,parentFileId)), headers:{"Content-Type":"application/json", ...cfg.getAuthHeader(token)}});
                } else if (driveState.type === "quark") {
                    resp = await apiFetch(cfg.listUrl+"?pr=ucpro&fr=pc&uc_param_str=&pdir_fid="+(parentFileId||"0")+"&_page=1&_size=100&_sort=file_type:asc,updated_at:desc", {headers:cfg.getAuthHeader(token)});
                } else if (driveState.type === "baidu") {
                    resp = await apiFetch(cfg.listUrl+"?dir="+encodeURIComponent(parentFileId||"/")+"&order=name&desc=0", {headers:cfg.getAuthHeader(token)});
                } else { container.innerHTML='<div class="text-white/40 text-xs text-center py-4">该网盘暂不支持</div>'; return; }
                var files = cfg.extractList(JSON.parse(resp));
                renderDriveFilesPanel(files);
                document.getElementById("driveStatusPanel").textContent = "已登录";
            } catch(e) { container.innerHTML='<div class="text-red-400 text-xs text-center py-4">加载失败: '+e.message+'</div>'; document.getElementById("driveStatusPanel").textContent="加载失败"; }
        }
        function renderDriveFilesPanel(files) {
            var c = document.getElementById("driveFileListPanel"); if (!c) return;
            if (!files||!files.length) { c.innerHTML='<div class="text-white/40 text-xs text-center py-4">空目录</div>'; document.getElementById("driveFileCountPanel").textContent="0"; return; }
            c.innerHTML = files.map(function(f) {
                var icon="", cls="other";
                if (f.isFolder) { icon="📁"; cls="folder"; }
                else if (f.isVideo) { icon="🎬"; cls="video"; }
                else icon="📄";
                var sz = f.size ? (f.size>1073741824?(f.size/1073741824).toFixed(1)+"GB":f.size>1048576?(f.size/1048576).toFixed(1)+"MB":f.size>1024?Math.round(f.size/1024)+"KB":f.size+"B"):"";
                var nm = (f.name||"").replace(/"/g,"&quot;");
                return '<div class="drive-file-item '+cls+'" onclick="handleDriveFileClickPanel(\x27' + f.id + '\x27,' + f.isFolder + ',' + f.isVideo + ',\x27' + nm.replace(/\x27/g,'%27') + '\x27)">' +
                    '<span class="drive-file-icon">'+icon+'</span><span class="drive-file-name">'+nm+'</span><span class="drive-file-size">'+sz+'</span></div>';
            }).join("");
            document.getElementById("driveFileCountPanel").textContent = files.length + "个文件";
        }
        async function handleDriveFileClickPanel(fileId, isFolder, isVideo, fileName) {
            if (isFolder) { driveState.currentPath.push({id:fileId,name:fileName}); renderBreadcrumbPanel(); await loadDriveFilesPanel(fileId); }
            else if (isVideo) { await resolveDrivePlay(driveState.type, driveState.token, driveState.driveId, fileId, fileName, false); toggleDrivePanel(); }
            else { showAlert("该文件不是视频格式", "提示"); }
        }
        function refreshDriveFilesFromPanel() {
            var t = driveState.currentPath[driveState.currentPath.length-1];
            loadDriveFilesPanel(t ? t.id : "root");
        }
        renderTokenList();
        onDriveTypeChange();
        console.log('☁️ 网盘播放模块已就绪, 支持: 阿里云盘/夸克/百度/UC/123/139');

        //                  
        window.addEventListener('resize', function() {
            const searchPanel = document.getElementById('searchPanel');
            if (!searchPanel.classList.contains('hidden')) {
                const searchBtn = document.getElementById('searchBtn');
                const panelWidth = 256; // 16rem = 256px
                const btnRect = searchBtn.getBoundingClientRect();
                const leftPosition = (window.innerWidth - panelWidth) / 2;
                
                searchPanel.style.left = leftPosition + 'px';
                searchPanel.style.bottom = (window.innerHeight - btnRect.top) + 8 + 'px';
            }
        });
    </script>

    <!-- 网盘管理弹窗 -->
    <div id="drivePanelOverlay" class="hidden fixed inset-0 z-50 flex items-center justify-center" style="background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);" onclick="if(event.target===this)toggleDrivePanel()">
        <div class="rounded-2xl overflow-hidden" style="width: 92%; max-width: 420px; max-height: 85vh; background: rgba(15,15,25,0.96); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 24px 64px rgba(0,0,0,0.8);">
            <div class="flex items-center justify-between px-4 py-3 border-b border-white/10">
                <h3 class="text-white text-sm font-semibold flex items-center gap-2">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
                    网盘管理
                </h3>
                <button class="glass-btn p-1.5 rounded-lg text-white/60 hover:text-white cursor-pointer" onclick="toggleDrivePanel()">
                  <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                  </svg>
                </button>
            </div>
            <div class="p-4 space-y-4 overflow-y-auto" style="max-height: calc(85vh - 55px);">
                <div>
                    <label class="text-white/60 text-[11px] mb-1.5 block">选择网盘</label>
                    <select id="driveTypeSelect2" class="w-full glass-btn px-3 py-2 rounded-xl text-white text-xs bg-transparent outline-none cursor-pointer" onchange="onDrivePanelTypeChange()">
                        <option value="alipan" class="bg-gray-800">☁️ 阿里云盘</option>
                        <option value="quark" class="bg-gray-800">☁️ 夸克网盘</option>
                        <option value="baidu" class="bg-gray-800">☁️ 百度网盘</option>
                        <option value="uc" class="bg-gray-800">☁️ UC网盘</option>
                        <option value="123pan" class="bg-gray-800">☁️ 123云盘</option>
                        <option value="139pan" class="bg-gray-800">☁️ 139云盘</option>
                    </select>
                </div>
                <div>
                    <label class="text-white/60 text-[11px] mb-1.5 block">已保存的Token <span class="text-white/30">(点击使用)</span></label>
                    <div id="driveTokenListPanel" class="space-y-1 max-h-[80px] overflow-y-auto"></div>
                </div>
                <div>
                    <label class="text-white/60 text-[11px] mb-1.5 block">手动输入Token</label>
                    <div class="flex gap-2">
                        <input type="text" id="driveTokenInputPanel" placeholder="粘贴 AccessToken 或 BDUSS" class="flex-1 glass-btn px-3 py-2 rounded-xl text-white text-xs bg-transparent outline-none placeholder:text-white/40">
                        <button class="glass-btn px-3 py-2 rounded-xl text-yellow-400 text-xs cursor-pointer whitespace-nowrap" onclick="setDriveTokenFromPanel()">保存</button>
                    </div>
                </div>
                <div>
                    <label class="text-white/60 text-[11px] mb-1.5 block">解析分享链接</label>
                    <div class="flex gap-2">
                        <input type="text" id="driveShareInputPanel" placeholder="粘贴分享链接(自动识别网盘)" class="flex-1 glass-btn px-3 py-2 rounded-xl text-white text-xs bg-transparent outline-none placeholder:text-white/40">
                        <button class="glass-btn px-3 py-2 rounded-xl text-blue-400 text-xs cursor-pointer whitespace-nowrap" onclick="resolveShareUrlFromPanel()">解析</button>
                    </div>
                    <p class="text-white/30 text-[10px] mt-1">支持: alipan.com/s/xxx . pan.quark.cn/s/xxx . pan.baidu.com/s/xxx</p>
                </div>
                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <span class="text-white/60 text-[11px]">文件浏览</span>
                        <div class="flex gap-2">
                            <button class="glass-btn px-2 py-1 rounded-lg text-white/60 text-[10px] cursor-pointer" onclick="refreshDriveFilesFromPanel()">刷新</button>
                            <button class="glass-btn px-2 py-1 rounded-lg text-emerald-400 text-[10px] cursor-pointer" onclick="openDriveBrowserFromPanel()">浏览</button>
                        </div>
                    </div>
                    <div class="drive-breadcrumb" id="driveBreadcrumbPanel"></div>
                    <div id="driveFileListPanel" class="max-h-[200px] overflow-y-auto space-y-0.5 rounded-xl bg-white/5 p-2">
                        <div class="text-white/40 text-xs text-center py-6">请先保存Token后点击"浏览"</div>
                    </div>
                </div>
                <div class="flex items-center justify-between text-white/40 text-[11px] pt-2 border-t border-white/10">
                    <span id="driveStatusPanel">未登录</span>
                    <span id="driveFileCountPanel"></span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
